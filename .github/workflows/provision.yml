name: Provision Azure Resources
run-name: "Provision — ${{ github.event.inputs.resource_group }} (${{ github.event.inputs.shell }})"

on:
  workflow_dispatch:
    inputs:
      resource_group:
        description: "Your resource group name (e.g. rg-alderic-hoarau)"
        required: true
        type: string
      shell:
        description: "Script to use"
        required: true
        type: choice
        options:
          - bash
          - powershell
        default: bash

permissions: {}

env:
  ARM_USE_OIDC:   "true"
  RESOURCE_GROUP: ${{ github.event.inputs.resource_group }}
  RG_SHARED:      ${{ vars.RG_SHARED || 'rg-shared-prf2026' }}
  APP_PLAN_NAME:  ${{ vars.APP_PLAN_NAME || 'plan-npr-prf2026' }}

jobs:
  provision:
    name: Create Azure Resources
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Azure Login (OIDC)
        uses: azure/login@v3
        with:
          client-id:       ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id:       ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Derive OWNER from resource group name
        run: echo "OWNER=${RESOURCE_GROUP#rg-}" >> "$GITHUB_ENV"

      - name: Verify Resource Group exists
        run: |
          if ! az group show --name "$RESOURCE_GROUP" &>/dev/null; then
            echo "❌ Resource Group '$RESOURCE_GROUP' does not exist."
            echo "   The trainer must create it before running this workflow."
            exit 1
          fi
          echo "✅ Resource Group found: $RESOURCE_GROUP"

      - name: Provision resources (bash)
        if: github.event.inputs.shell == 'bash'
        run: bash bash/provision.sh

      - name: Provision resources (powershell)
        if: github.event.inputs.shell == 'powershell'
        shell: pwsh
        run: pwsh powershell/provision.ps1
