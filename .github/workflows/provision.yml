name: Provision Azure Resources

on:
  workflow_dispatch:
    inputs:
      owner:
        description: "Your firstname-lastname (e.g. alderic-hoarau)"
        required: true
        type: string

permissions:
  id-token: write
  contents: read

env:
  ARM_USE_OIDC:        "true"
  OWNER:               ${{ github.event.inputs.owner }}
  RESOURCE_GROUP:      "rg-${{ github.event.inputs.owner }}"

jobs:
  provision:
    name: Create Azure Resources
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Azure Login (OIDC)
        uses: azure/login@v2
        with:
          client-id:       ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id:       ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Verify Resource Group exists
        run: |
          if ! az group show --name "$RESOURCE_GROUP" &>/dev/null; then
            echo "❌ Resource Group '$RESOURCE_GROUP' does not exist."
            echo "   The trainer must create it before running this workflow."
            exit 1
          fi
          echo "✅ Resource Group found: $RESOURCE_GROUP"

      - name: Provision resources
        run: bash bash/provision.sh
