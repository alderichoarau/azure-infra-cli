name: Friday Evening Cleanup
run-name: "Cleanup — ${{ github.event.inputs.resource_group || 'scheduled' }} (${{ github.event.inputs.shell || 'bash' }})"

on:
  schedule:
    - cron: '0 18 * * 5'   # Friday 18:00 UTC = 20:00 Paris (summer time)
  workflow_dispatch:         # manual trigger if needed
    inputs:
      resource_group:
        description: "Your resource group name (e.g. rg-alderic-hoarau) — leave empty to use the secret"
        required: false
        type: string
      shell:
        description: "Script to use"
        required: false
        type: choice
        options:
          - bash
          - powershell
        default: bash

permissions: {}

env:
  RESOURCE_GROUP: ${{ github.event.inputs.resource_group || secrets.AZURE_RESOURCE_GROUP }}

jobs:
  cleanup:
    name: Delete CLI resources
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Azure Login (OIDC)
        uses: azure/login@v3
        with:
          client-id:       ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id:       ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Derive OWNER from resource group name
        run: echo "OWNER=${RESOURCE_GROUP#rg-}" >> "$GITHUB_ENV"

      - name: Delete resources tagged managed_by=cli (bash)
        if: github.event.inputs.shell != 'powershell'
        run: bash bash/destroy.sh

      - name: Delete resources tagged managed_by=cli (powershell)
        if: github.event.inputs.shell == 'powershell'
        shell: pwsh
        run: pwsh powershell/destroy.ps1

      - name: Cleanup summary
        if: always()
        run: |
          {
            echo "## Friday Evening Cleanup"
            echo ""
            echo "- **Owner** : $OWNER"
            echo "- **Resource Group** : $RESOURCE_GROUP"
            echo "- **Target tag** : \`managed_by=cli\`"
            echo "- **Terraform resources** : not affected (\`managed_by=terraform\`)"
          } >> "$GITHUB_STEP_SUMMARY"
